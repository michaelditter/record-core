name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - run: npm install
      # Real Schnorr sign -> verify roundtrip + tamper rejection + CRP tag grammar.
      # No network: the crypto is exercised locally, so CI is deterministic.
      - run: npm test
